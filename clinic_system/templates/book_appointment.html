{% extends "base.html" %}
{% block title %}Book Appointment · Aurelia Clinic{% endblock %}

{% block content %}
<div class="container-narrow">
  <div class="page-header" style="border: none;">
    <div>
      <h1>Book an appointment.</h1>
      <p class="subtitle">Choose a doctor and a date that works for you.</p>
    </div>
  </div>

  <div class="form-card">
    <form method="POST" action="{{ url_for('book_appointment') }}">
      <div class="form-group">
        <label for="doctorID">Doctor</label>
        <select id="doctorID" name="doctorID" class="form-control" required>
          <option value="">-- Select a doctor --</option>
          {% for doc in doctors %}
          <option value="{{ doc.doctorID }}">
            {{ doc.doctorName }} ({{ doc.specialization }}) — ${{ '%.2f'|format(doc.consultationFee or 0) }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="appointmentDate">Date & Time</label>
        <input type="datetime-local" id="appointmentDate" name="appointmentDate" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="reason">Reason for visit (optional)</label>
        <textarea id="reason" name="reason" class="form-control" placeholder="Brief description of symptoms or purpose..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg">Confirm booking →</button>
    </form>
  </div>

  <p class="text-center text-muted mt-3" style="font-size: .85rem;">
    An invoice will be auto-generated based on the doctor's consultation fee.
  </p>
</div>
{% endblock %}
