{% extends "base.html" %}
{% block title %}Add Pharmacist · Admin{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width: 560px;">
    <h1>Add a pharmacist.</h1>
    <p class="auth-subtitle">Create a pharmacist account. They can log in with these credentials.</p>

    <form method="POST" action="{{ url_for('add_pharmacist') }}">
      <div class="form-group">
        <label for="full_name">Full name</label>
        <input type="text" id="full_name" name="full_name" class="form-control" required minlength="3">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" class="form-control" required minlength="5">
        </div>
        <div class="form-group">
          <label for="password">Temporary password</label>
          <input type="password" id="password" name="password" class="form-control" required minlength="6">
          <label class="show-password-label">
            <input type="checkbox" id="showPassword"> Show password
          </label>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="text" id="phone" name="phone" class="form-control" required minlength="9" maxlength="15">
        </div>
      </div>

      <div class="form-group">
        <label for="photo">Photo path (optional)</label>
        <input type="text" id="photo" name="photo" class="form-control" placeholder="/static/image/ph1.jpg">
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg">Create pharmacist account</button>
    </form>
  </div>
</div>
<script>
  const passwordField = document.getElementById("password");
  const toggle = document.getElementById("showPassword");

  toggle.addEventListener("change", function () {
    if (this.checked) {
      passwordField.type = "text";   // show password
    } else {
      passwordField.type = "password"; // hide password
    }
  });
</script>
{% endblock %}
