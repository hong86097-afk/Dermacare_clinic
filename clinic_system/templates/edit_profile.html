{% extends "base.html" %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width: 560px;">
    <h1>My profile.</h1>
    <p class="auth-subtitle">Update your personal information.</p>

    <form method="POST" action="{{ url_for('edit_profile') }}">
      {% if profile is not none %}
      <div class="form-group">
        <label for="full_name">Full name</label>
        <input type="text" id="full_name" name="full_name" class="form-control"
               value="{{ profile.patientName }}" required minlength="3">
      </div>
      {% endif %}

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" class="form-control"
               value="{{ user.email }}" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" class="form-control"
               value="{{ user.phone }}" minlength="9" maxlength="15">
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg">Save changes</button>
    </form>
  </div>
</div>
{% endblock %}
